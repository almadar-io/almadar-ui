name: Publish to npm

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # No local pnpm-lock.yaml: this submodule is part of the root pnpm workspace
      # (sharedWorkspaceLockfile: true) and is published standalone from its own repo.
      # Resolve dependencies fresh so CI does not fail on a missing frozen lockfile.
      - run: pnpm install --frozen-lockfile

      - name: Verify theme contrast (WCAG AA)
        run: pnpm verify:themes

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: "--max-old-space-size=8192"

      - name: Publish
        run: |
          echo "//registry.npmjs.org/:_authToken=${NPM_TOKEN}" > ~/.npmrc
          pnpm publish --access public --no-git-checks
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}

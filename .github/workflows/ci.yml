name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: pnpm

      - run: pnpm install --no-frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Build
        run: pnpm build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'

      - name: Test
        run: pnpm test --if-present

      - name: Lint
        run: pnpm exec eslint --no-warn-ignored --max-warnings 0 components/ hooks/ providers/ context/ stores/ renderer/ lib/ types/

  # validate-service disabled (service .orb schemas need fixing)
